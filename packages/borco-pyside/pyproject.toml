[project]
name = "borco-pyside"
dynamic = ["version"]
description = "Generic reusable PySide6/Qt classes and utilities"
readme = "README.md"
license = "MIT"
license-files = ["LICENSE"]
authors = [
    { name = "Ioan Calin", email = "iborco@gmail.com" },
]
keywords = ["borco", "pyside6", "qt", "gui", "library", "utilities"]
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "Intended Audience :: Developers",
    "Environment :: X11 Applications :: Qt",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.14",
    "Topic :: Software Development :: Libraries",
]
requires-python = ">=3.14"
dependencies = [
    "PySide6>=6.9",
    "colorama>=0.4.6",
    "pyside6-qtads>=5.0.0",
]

[project.urls]
Homepage = "https://borco.github.io/rehuco/"
Repository = "https://github.com/borco/rehuco/tree/master/packages/borco-pyside"
Issues = "https://github.com/borco/rehuco/issues"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.version]
path = "src/borco_pyside/__init__.py"

[tool.hatch.build.targets.wheel]
packages = ["src/borco_pyside"]

[dependency-groups]
dev = [
    "types-colorama>=0.4.15.20260408",
]
