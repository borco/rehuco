name: Publish docs

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest

    # self-hosted so the deploy doesn't depend on the public plantuml.com server's availability/rate
    # limits; only needed for the "Deploy docs" step below, since mkdocs-puml inlines the rendered
    # SVG into the built HTML at that point -- no runtime dependency on this server afterward.
    services:
      plantuml:
        image: plantuml/plantuml-server:jetty
        ports:
          - 8080:8080

    steps:
      - uses: actions/checkout@v7

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Install dependencies
        run: uv sync

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Deploy docs
        env:
          PUML_URL: http://localhost:8080
        run: uv run mkdocs gh-deploy --force
