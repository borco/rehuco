name: QA

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  qa:
    name: qa (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v7

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.14"

      # windows-latest ships ImageMagick but not GNU Make; see §A02.2.
      - name: Install make (Windows)
        if: runner.os == 'Windows'
        run: choco install make --no-progress -y

      # ubuntu-latest/macos-latest don't ship ImageMagick; windows-latest already has it.
      # Ubuntu's `imagemagick` apt package is IM6, which has no unified `magick` binary (that's
      # IM7-only) -- alias it to the IM6 `convert` command the Makefile's rule is compatible with.
      # libegl1 provides libEGL.so.1, which PySide6.QtGui needs to import at all -- unrelated to
      # QT_QPA_PLATFORM=offscreen (conftest.py), which only picks the platform plugin, not this.
      - name: Install Linux system dependencies (ImageMagick, Qt runtime libs)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick libegl1
          command -v magick || sudo ln -s "$(command -v convert)" /usr/local/bin/magick

      - name: Install ImageMagick (macOS)
        if: runner.os == 'macOS'
        run: brew install imagemagick

      - name: Install dependencies
        run: uv sync

      - name: Generate Qt build artifacts (uic/rcc/icons)
        run: make uis

      # Non-mutating equivalent of `make format` -- see §A02.1.
      - name: Check formatting and lint (ruff)
        run: |
          uv run ruff format --check .
          uv run ruff check .

      - name: Run tests with coverage
        run: make cov

      - name: bandit
        run: make bandit

      - name: pyright
        run: make pyright

      - name: pylint
        run: make pylint
