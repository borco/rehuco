[tool.uv.workspace]
members = [
    "packages/*",
    "apps/*",
]

[dependency-groups]
dev = [
    "bandit>=1.8",
    "markdown-callouts>=0.4",
    "mkdocs>=1.6",
    "mkdocs-exclude>=1.0",
    "mkdocs-material>=9.5",
    "pyright>=1.1",
    "pylint>=3.3",
    "pylint-qt>=0.1",
    "pytest>=8.3",
    "pytest-benchmark>=5.1",
    "pytest-cov>=6.1",
    "pytest-explicit>=1.0",
    "pytest-freezer>=0.4",
    "pytest-mock>=3.14",
    "pytest-qt>=4.4",
    "ruff>=0.11",
]

[tool.ruff]
line-length = 120
target-version = "py314"

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]

[tool.bandit]
exclude_dirs = ["tests"]

[tool.pylint.main]
jobs = 0
recursive = true
extension-pkg-allow-list = ["PySide6"]
load-plugins = ["pylint_qt"]
# generated by pyside6-uic/-rcc (make uis / make qrcs); gitignored, never hand-edited or hand-fixed
ignore-patterns = [".*_ui\\.py$", ".*_rc\\.py$"]

[tool.pylint.format]
max-line-length = 120

[tool.pyright]
pythonVersion = "3.14"
typeCheckingMode = "standard"
# This is a cross-platform project with per-platform modules (Windows winreg/ctypes.windll,
# macOS/Linux paths). "All" makes platform-gated stdlib symbols resolvable regardless of which
# OS qa runs on, so e.g. platforms/windows/ type-checks on macOS/Linux instead of erroring.
pythonPlatform = "All"

[tool.pylint.messages_control]
# redefined-outer-name: standard false positive for pytest fixtures used as same-file test parameters
disable = ["fixme", "redefined-outer-name"]
enable = ["useless-suppression"]

[tool.pylint.typecheck]
# winreg is Windows-only; on a macOS/Linux qa run pylint can't import it and would raise
# import-error. A per-line disable can't be used here -- useless-suppression (enabled above)
# would flag it on Windows, where the import resolves fine. Ignoring the module is platform-safe.
ignored-modules = ["winreg"]

[tool.pytest.ini_options]
addopts = "--strict-markers"
testpaths = ["packages", "apps"]
markers = [
    "slow: marks tests that are slow to run",
    "disk: marks tests that perform real disk I/O (no mocks)",
    "windows: marks tests that only run on Windows",
    "macos: marks tests that only run on macOS",
    "linux: marks tests that only run on Linux",
]

[tool.coverage.run]
branch = true
omit = [
    # generated by pyside6-uic/-rcc (make uis / make qrcs); gitignored, never hand-edited or hand-fixed
    "*_ui.py",
    "*_rc.py",
    # measure production code exercised by tests, not the tests' own lines
    "*/tests/*",
    "*conftest.py",
]

[tool.coverage.html]
directory = ".htmlcov"
